name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - name: Install dependencies
        run: pnpm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          
      - name: Build MCP Servers
        run: |
          cd packages/ozon-selection-mcp && pnpm install && pnpm build
          cd ../source-1688-mcp && pnpm install && pnpm build
          cd ../ozon-listing-mcp && pnpm install && pnpm build
          
      - name: Build Electron App
        run: pnpm run build
        working-directory: apps/ui-tars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          PUPPETEER_SKIP_DOWNLOAD: true
          
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: HaloClaw-Windows-x64
          path: apps/ui-tars/out/make/**/*.exe
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: HaloClaw-Windows-x64
          path: dist
          
      - name: List artifacts
        run: ls -la dist/
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.version
        with:
          tag_name: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: HaloClaw ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref_name }}
          draft: true
          files: |
            dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
