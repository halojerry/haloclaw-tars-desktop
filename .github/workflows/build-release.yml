name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-mcp:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies for ozon-selection-mcp
        run: |
          cd packages/ozon-selection-mcp
          npm install
          npm run build
        continue-on-error: true
        
      - name: Install dependencies for ozon-listing-mcp
        run: |
          cd packages/ozon-listing-mcp
          npm install
          npm run build
        continue-on-error: true
        
      - name: Install dependencies for source-1688-mcp
        run: |
          cd packages/source-1688-mcp
          npm install
          npm run build
        continue-on-error: true
        
      - name: List MCP build outputs
        run: |
          echo "=== Checking MCP build outputs ==="
          ls -la packages/ozon-selection-mcp/dist/ 2>/dev/null || echo "ozon-selection-mcp dist not found"
          ls -la packages/ozon-listing-mcp/dist/ 2>/dev/null || echo "ozon-listing-mcp dist not found"
          ls -la packages/source-1688-mcp/dist/ 2>/dev/null || echo "source-1688-mcp dist not found"
          
      - name: Upload MCP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-servers
          path: |
            packages/ozon-selection-mcp/dist/
            packages/ozon-listing-mcp/dist/
            packages/source-1688-mcp/dist/
          retention-days: 5

  build-electron:
    runs-on: windows-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: true
      NODE_OPTIONS: --max-old-space-size=4096
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies for Electron app
        run: |
          cd apps/ui-tars
          npm install --legacy-peer-deps
        timeout-minutes: 30
        continue-on-error: true
        
      - name: Show installed packages
        run: |
          echo "=== Installed packages ==="
          ls apps/ui-tars/node_modules/.bin/ 2>/dev/null | head -20 || echo "No binaries"
          
      - name: Build Electron App
        run: |
          cd apps/ui-tars
          npm run build || npx electron-vite build
        timeout-minutes: 30
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production
          
      - name: List build output
        run: |
          echo "=== Checking build outputs ==="
          ls -la apps/ui-tars/out/make/**/*.exe 2>/dev/null || echo "No .exe found in out/make"
          ls -la apps/ui-tars/out/ 2>/dev/null || echo "No out directory"
          ls -la apps/ui-tars/dist/ 2>/dev/null || echo "No dist directory"
          
      - name: Upload Windows artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: HaloClaw-Windows-x64
          path: apps/ui-tars/out/make/**/*.exe
          retention-days: 5

  release:
    needs: [build-mcp, build-electron]
    runs-on: ubuntu-latest
    if: always() && (needs.build-mcp.result == 'success' || needs.build-electron.result == 'success')
    permissions:
      contents: write
      
    steps:
      - name: Download MCP artifacts
        uses: actions/download-artifact@v4
        with:
          name: mcp-servers
          path: dist/mcp
          
      - name: Download Electron artifacts
        uses: actions/download-artifact@v4
        with:
          name: HaloClaw-Windows-x64
          path: dist/electron
          
      - name: List all artifacts
        run: |
          echo "=== All artifacts ==="
          ls -la dist/
          ls -la dist/mcp/ 2>/dev/null || echo "No MCP dist"
          ls -la dist/electron/ 2>/dev/null || echo "No Electron dist"
